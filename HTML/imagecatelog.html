<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    .container{
        display: grid;
        grid-template-columns: repeat(7, auto);
        gap: 0px 0px;
    }
    .container div{
        height: 100px;
    }
    .container div:nth-child(2), .container div:nth-child(3){
        background-color: red;
    }
    .container div:nth-child(7), .container div:nth-child(10), .container div:nth-child(11), .container div:nth-child(9), .container div:nth-child(12), .container div:nth-child(14), .container div:nth-child(21){
        background-color: red;
    }
    .container div:nth-child(16), .container div:nth-child(27){
        background-color: red;
    }
    .container div:nth-child(5){
        grid-column: span 2;
        grid-row: span 2;
        background-color: pink;
    }
    .container div:nth-child(8){
        grid-column: span 2;
        grid-row: span 2;
        background-color: pink;
    }
    .container div:nth-child(13){
        grid-column: span 2;
        grid-row: span 2;
        background-color: pink;
    }

    .container div:nth-child(17){
        grid-column: span 2;
        grid-row: span 2;
        background-color: pink;
    }
    

    

</style>
<body>
    <div class="container">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>7</div>  
        <div>8</div>
        <div>9</div>
        <div>10</div>
        <div>11</div>
        <div>12</div>
        <div>13</div>
        <div>14</div>
        <div>15</div>
        <div>16</div>
        <div>17</div>
        <div>18</div>
        <div>19</div>
        <div>20</div>
        <div>21</div>
        <div>22</div>
        <div>23</div>
        <div>24</div>
        <div>25</div>
        <div>26</div>
        <div>27</div>
        <div>28</div>
        <div>29</div>
        <div>30</div>
        
    </div>

    
</body>
</html>
